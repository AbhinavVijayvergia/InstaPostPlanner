<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GridPlan 4 — Instagram Feed Planner</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg0:#000;--bg1:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;
  --bd:#2e2e2e;--bd2:#3a3a3a;
  --t1:#fff;--t2:#a8a8a8;--t3:#555;
  --acc:#e1306c;--acc2:#c0215a;--blue:#0095f6;
  --gr:linear-gradient(135deg,#f58529,#dd2a7b,#8134af,#515bd4)
}
.lm{
  --bg0:#fafafa;--bg1:#fff;--bg2:#f0f0f0;--bg3:#e8e8e8;
  --bd:#dbdbdb;--bd2:#c8c8c8;--t1:#0a0a0a;--t2:#555;--t3:#aaa
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;background:var(--bg2);border:1px solid var(--bd);color:var(--t1);border-radius:8px;padding:9px 12px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--blue)}
select{-webkit-appearance:none;appearance:none}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;line-height:1}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:var(--acc2)}
.btn-s{background:var(--bg2);color:var(--t1);border:1px solid var(--bd)}.btn-s:hover{background:var(--bg3)}
.btn-ico{display:inline-flex;align-items:center;justify-content:center;padding:7px;border-radius:8px;background:var(--bg2);border:1px solid var(--bd);color:var(--t2);transition:all .15s}.btn-ico:hover{color:var(--t1);border-color:var(--bd2)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg2);color:var(--t2);border:1px solid var(--bd);cursor:pointer;transition:all .15s;white-space:nowrap}.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.tab-bar{display:flex;background:var(--bg2);border-radius:10px;padding:3px}
.tab-btn{flex:1;padding:7px;border-radius:7px;border:none;background:transparent;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}.tab-btn.on{background:var(--bg1);color:var(--t1)}
.upload-zone{border:2px dashed var(--bd2);border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s}.upload-zone:hover,.upload-zone.over{border-color:var(--acc);background:rgba(225,48,108,.06)}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.gimg{aspect-ratio:1;overflow:hidden;border-radius:7px;cursor:pointer;position:relative;border:2px solid transparent;transition:border-color .15s}.gimg.in{border-color:var(--blue)}.gimg img{width:100%;height:100%;object-fit:cover;display:block}.gimg .del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.75);color:#fff;border:none;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}.gimg:hover .del{opacity:1}
.lbl{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.proj-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;border:1px solid var(--bd);cursor:pointer;transition:all .15s}.proj-item:hover{border-color:var(--bd2);background:var(--bg2)}
.proj-thumb{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:48px;height:48px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--bg3)}.proj-thumb div{overflow:hidden;background:var(--bg3)}.proj-thumb img{width:100%;height:100%;object-fit:cover}
.spin{width:16px;height:16px;border:2.5px solid var(--bd2);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd2);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none;white-space:nowrap;animation:su .22s ease}
.gtext{background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stats-row{display:flex;gap:20px}.stats-row .stat span{font-size:14px;font-weight:700;display:block;color:var(--t1)}.stats-row .stat p{font-size:12px;color:var(--t2)}

/* ═══════════════════════════════════════════════
   INSTAGRAM GRID — drag + zoom/pan architecture
   ═══════════════════════════════════════════════
   KEY RULES:
   1. The .cell itself is draggable (no overlay on top blocking it)
   2. Edit mode (zoom/pan) disables draggable so touch/mouse go to image
   3. NO .cell-tap overlay. Clicking is handled by onPointerUp instead.
*/
.ig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--bg0)}

.cell{
  aspect-ratio:1;overflow:hidden;position:relative;
  background:var(--bg2);
  /* Default: grab cursor for drag */
  cursor:grab;
  user-select:none;-webkit-user-select:none;
}
.cell:active{cursor:grabbing}

/* Image wrapper — clips the zoomed/panned image */
.cell-img{
  position:absolute;inset:0;overflow:hidden;
  pointer-events:none; /* never intercept events in normal mode */
}
.cell-img img,.cell-img video{
  width:100%;height:100%;
  object-fit:cover;display:block;
  pointer-events:none;
  user-select:none;-webkit-user-select:none;
  /* transform-origin is set dynamically via inline style */
  will-change:transform;
  transition:none;
}

/* Edit mode: blue ring, cursor changes, image layer gets pointer events */
.cell.edit-mode{
  cursor:default;
  outline:3px solid var(--blue);
  outline-offset:-3px;
}
.cell.edit-mode .cell-img{
  pointer-events:auto;
  cursor:move;
}

/* Drag states */
.cell.dragging{opacity:.28}
.cell.drag-over{outline:3px solid var(--acc);outline-offset:-3px}
/* Don't show drag-over ring when in edit mode */
.cell.edit-mode.drag-over{outline-color:var(--blue)}

/* Hover bar — fades in on hover, always visible in edit mode */
.cell-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:20px 5px 5px;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  display:flex;align-items:flex-end;justify-content:space-between;
  opacity:0;transition:opacity .15s;
  pointer-events:none;
  z-index:10;
}
.cell:hover .cell-bar,.cell.edit-mode .cell-bar{opacity:1;pointer-events:auto}

/* Drag handle pill (shown in normal mode) */
.drag-handle{
  display:flex;align-items:center;gap:3px;
  background:rgba(0,0,0,.6);border-radius:4px;
  padding:3px 5px;cursor:grab;
  /* CRITICAL: must NOT prevent default so parent drag events fire */
}

/* Small action buttons in the bar */
.cell-btn{
  background:rgba(0,0,0,.6);border:none;border-radius:4px;
  color:#fff;font-size:10px;font-weight:600;
  padding:3px 8px;cursor:pointer;transition:opacity .15s;
  pointer-events:auto;
}
.cell-btn:active{opacity:.6}
.cell-btn.blue{background:rgba(0,120,200,.8)}
.cell-btn.red{background:rgba(200,40,40,.7)}

/* Zoom control pill floating top-left (only in edit mode) */
.zoom-ctl{
  position:absolute;top:5px;left:5px;z-index:11;
  display:flex;align-items:center;gap:2px;
  background:rgba(0,0,0,.78);border-radius:20px;padding:3px 6px;
  pointer-events:auto;
}
.zoom-ctl button{
  background:none;border:none;color:#fff;
  font-size:18px;line-height:1;padding:0 4px;
  cursor:pointer;transition:opacity .12s;
}
.zoom-ctl button:active{opacity:.5}
.zoom-ctl span{color:#fff;font-size:11px;font-weight:700;min-width:34px;text-align:center}

/* Tags */
.tag-n{position:absolute;top:4px;right:4px;background:var(--acc);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;z-index:12;pointer-events:none;letter-spacing:.4px}
.vid-badge{position:absolute;bottom:4px;left:4px;display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.72);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;z-index:12;pointer-events:none}
.empty-cell{aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t3)}

/* Profile */
.profile-header{padding:14px 16px;border-bottom:1px solid var(--bd)}
.avatar-ring{width:68px;height:68px;border-radius:50%;background:var(--gr);padding:2px;cursor:pointer;flex-shrink:0}
.avatar-inner{width:'100%';height:'100%';border-radius:50%;overflow:hidden;background:var(--bg1);display:flex;align-items:center;justify-content:center;color:var(--t3)}

/* Feed viewer */
.feed-backdrop{position:fixed;inset:0;z-index:500;background:var(--bg0);display:flex;flex-direction:column;overflow:hidden;animation:fi .18s ease}
.feed-topbar{display:flex;align-items:center;padding:8px 4px 8px 2px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg0)}
.feed-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.feed-post{background:var(--bg0)}
.feed-post-header{display:flex;align-items:center;gap:8px;padding:8px 12px}
.feed-img-wrap{position:relative;width:100%;max-width:468px;aspect-ratio:1;overflow:hidden;background:#111;margin:0 auto}
.feed-track{display:flex;height:100%;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.feed-slide{flex:0 0 100%;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center}
.feed-slide img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.feed-slide video{width:100%;height:100%;object-fit:contain;background:#000}
.feed-arr{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.88);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;opacity:.85;color:#222;transition:opacity .15s}.feed-arr:hover{opacity:1}.feed-arr.l{left:8px}.feed-arr.r{right:8px}
.feed-counter{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:14px;pointer-events:none}
.feed-dots{display:flex;gap:5px;align-items:center;justify-content:center;padding:8px 0 2px}
.feed-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:background .2s}.feed-dot.on{background:var(--blue)}
.feed-actions{display:flex;align-items:center;padding:6px 10px 2px}
.feed-action-btn{background:none;border:none;color:var(--t1);padding:6px 8px;display:flex;align-items:center;transition:transform .12s}.feed-action-btn:active{transform:scale(.85)}
.feed-likes{padding:2px 14px 4px;font-size:13px;font-weight:700}
.feed-caption{padding:0 14px 4px;font-size:13px;line-height:1.45}.feed-caption strong{font-weight:600;margin-right:4px}
.feed-cmt{padding:0 14px 3px;font-size:13px;color:var(--t2)}
.feed-time{padding:2px 14px 10px;font-size:10px;color:var(--t3);letter-spacing:.3px;text-transform:uppercase}
.feed-cmt-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--bd);background:var(--bg0);flex-shrink:0}
@keyframes heartburst{0%{transform:scale(0) translate(-50%,-50%);opacity:1}60%{transform:scale(1.6) translate(-50%,-50%);opacity:1}100%{transform:scale(1.2) translate(-50%,-50%);opacity:0}}
.heart-burst{position:absolute;top:50%;left:50%;pointer-events:none;z-index:20;animation:heartburst .6s ease forwards}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg1);border:1px solid var(--bd);border-radius:16px;padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}

/* Desktop / Mobile layout */
@media(min-width:768px){
  .app-layout{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:320px;height:100vh;overflow-y:auto;border-right:1px solid var(--bd);flex-shrink:0;background:var(--bg1)}
  .main-area{flex:1;height:100vh;overflow-y:auto}
  .mob-header,.drawer,.drawer-backdrop{display:none!important}
}
@media(max-width:767px){
  .app-layout{display:block;min-height:100vh}
  .sidebar{display:none!important}
}
.mob-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:40}
.hamburger-btn{background:none;border:none;color:var(--t1);padding:4px;display:flex;align-items:center;border-radius:6px}
.drawer-backdrop{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s}.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:80vw;background:var(--bg1);border-right:1px solid var(--bd);z-index:160;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}.drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.drawer-nav{display:flex;flex-direction:column;gap:2px;padding:8px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;background:none;border:none;color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;width:100%}.drawer-item:hover,.drawer-item.on{background:var(--bg2);color:var(--t1);font-weight:600}
.drawer-content{flex:1;overflow-y:auto;border-top:1px solid var(--bd)}
.drawer-footer{padding:12px 16px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
hr{border:none;border-top:1px solid var(--bd);margin:14px 0}
@keyframes su{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes sp{to{transform:rotate(360deg)}}
</style>

const {useState,useEffect,useRef,useCallback}=React;

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function useLs(key,def){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def}catch{return def}});
  const set=useCallback(u=>sv(p=>{const n=typeof u==='function'?u(p):u;try{localStorage.setItem(key,JSON.stringify(n))}catch{}return n}),[key]);
  return[v,set];
}

function fmtSize(b){if(!b)return '';if(b<1048576)return(b/1024).toFixed(0)+'KB';return(b/1048576).toFixed(1)+'MB'}

async function genVideoThumb(file){
  return new Promise(res=>{
    const v=document.createElement('video');v.muted=true;v.playsInline=true;
    const u=URL.createObjectURL(file);v.src=u;let done=false;
    v.onloadeddata=()=>{v.currentTime=0.5};
    v.onseeked=()=>{if(done)return;done=true;const c=document.createElement('canvas');c.width=v.videoWidth||320;c.height=v.videoHeight||320;c.getContext('2d').drawImage(v,0,0,c.width,c.height);URL.revokeObjectURL(u);res(c.toDataURL('image/jpeg',.7))};
    v.onerror=()=>{if(!done){done=true;URL.revokeObjectURL(u);res(null)}};
    setTimeout(()=>{if(!done){done=true;URL.revokeObjectURL(u);res(null)}},8000);
  });
}

  chevR:<svg width="18"height="18"viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2.5"strokeLinecap="round"strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,

/* ═══════════════════════════════
   GRID CELL — drag + zoom/pan
   ═══════════════════════════════ */
const DEFAULT_TF={scale:1,tx:0,ty:0}; // tx,ty are pixel offsets

function GridCell({img,idx,isEditMode,onActivateEdit,onDeactivateEdit,onRemove,tf,onTfChange,dragFrom,dragOver,onDragStart,onDragEnter,onDrop,onDragEnd,showPos,onOpenViewer}){
  const cellRef=useRef();
  const panRef=useRef(null);    // mouse pan state
  const touchRef=useRef(null);  // touch pan/pinch state
  const clickRef=useRef({moved:false,t:0}); // to distinguish click from drag

  /* ── Pan boundary helper ── */
  const clampOffset=(tx,ty,scale)=>{
    // max offset = how many pixels the zoomed image extends beyond cell edges
    const cell=cellRef.current;
    if(!cell)return{tx,ty};
    const w=cell.offsetWidth, h=cell.offsetHeight;
    const maxX=(w*(scale-1))/2;
    const maxY=(h*(scale-1))/2;
    return{tx:clamp(tx,-maxX,maxX),ty:clamp(ty,-maxY,maxY)};
  };

  /* ── Mouse pan (only in edit mode) ── */
  const onImgMouseDown=useCallback(e=>{
    if(!isEditMode)return;
    e.preventDefault();e.stopPropagation();
    const startX=e.clientX,startY=e.clientY;
    const startTx=tf.tx,startTy=tf.ty;
    panRef.current={startX,startY,startTx,startTy};
    const onMove=ev=>{
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      const{tx,ty}=clampOffset(startTx+dx,startTy+dy,tf.scale);
      onTfChange({...tf,tx,ty});
    };
    const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp)};
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  },[isEditMode,tf,onTfChange]);

  /* ── Scroll wheel zoom (only in edit mode) ── */
  const onWheel=useCallback(e=>{
    if(!isEditMode)return;
    e.preventDefault();
    const delta=e.deltaY>0?-0.12:0.12;
    const newScale=clamp((tf.scale||1)+delta,1,5);
    const{tx,ty}=clampOffset(tf.tx,tf.ty,newScale);
    onTfChange({...tf,scale:newScale,tx,ty});
  },[isEditMode,tf,onTfChange]);

  /* ── Touch: single-finger pan + two-finger pinch zoom ── */
  const onTouchStart=useCallback(e=>{
    if(!isEditMode)return;
    e.preventDefault();
    const t=e.touches;
    if(t.length===1){
      touchRef.current={type:'pan',x:t[0].clientX,y:t[0].clientY,tx:tf.tx,ty:tf.ty};
    } else if(t.length===2){
      const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      touchRef.current={type:'pinch',startDist:dist,startScale:tf.scale,tx:tf.tx,ty:tf.ty};
    }
  },[isEditMode,tf]);

  const onTouchMove=useCallback(e=>{
    if(!isEditMode||!touchRef.current)return;
    e.preventDefault();
    const t=e.touches,r=touchRef.current;
    if(r.type==='pan'&&t.length===1){
      const dx=t[0].clientX-r.x, dy=t[0].clientY-r.y;
      const{tx,ty}=clampOffset(r.tx+dx,r.ty+dy,tf.scale);
      onTfChange({...tf,tx,ty});
    } else if(r.type==='pinch'&&t.length===2){
      const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      const newScale=clamp(r.startScale*(dist/r.startDist),1,5);
      const{tx,ty}=clampOffset(r.tx,r.ty,newScale);
      onTfChange({...tf,scale:newScale,tx,ty});
    }
  },[isEditMode,tf,onTfChange]);

  const onTouchEnd=useCallback(e=>{
    if(isEditMode)e.preventDefault();
    touchRef.current=null;
  },[isEditMode]);

  /* ── HTML5 drag API for reorder (disabled in edit mode) ── */
  const handleDragStart=useCallback(e=>{
    if(isEditMode){e.preventDefault();return}
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',String(idx));
    // delay so the drag ghost is rendered before we dim
    setTimeout(()=>onDragStart(idx),0);
    clickRef.current.moved=true;
  },[isEditMode,idx,onDragStart]);

  const handleDragEnter=useCallback(e=>{e.preventDefault();onDragEnter(idx)},[idx,onDragEnter]);
  const handleDragOver=useCallback(e=>{e.preventDefault();e.dataTransfer.dropEffect='move'},[]);
  const handleDrop=useCallback(e=>{e.preventDefault();onDrop(idx)},[idx,onDrop]);
  const handleDragEnd=useCallback(()=>onDragEnd(),[onDragEnd]);

  /* ── Click (pointer) — distinguish short tap from drag ── */
  const handlePointerDown=useCallback(e=>{
    if(isEditMode)return; // in edit mode ignore
    clickRef.current={moved:false,t:Date.now(),x:e.clientX,y:e.clientY};
  },[isEditMode]);

  const handlePointerUp=useCallback(e=>{
    if(isEditMode)return;
    const ref=clickRef.current;
    const dx=Math.abs(e.clientX-(ref.x||0)),dy=Math.abs(e.clientY-(ref.y||0));
    const short=Date.now()-ref.t<300;
    if(short&&dx<6&&dy<6&&!ref.moved){
      // short tap with no movement = activate edit
      onActivateEdit(img.id);
    }
  },[isEditMode,img.id,onActivateEdit]);

  /* Zoom button handlers */
  const zoomBy=useCallback(delta=>{
    const newScale=clamp((tf.scale||1)+delta,1,5);
    const{tx,ty}=clampOffset(tf.tx,tf.ty,newScale);
    onTfChange({...tf,scale:newScale,tx,ty});
  },[tf,onTfChange]);

  const reset=useCallback(()=>onTfChange(DEFAULT_TF),[onTfChange]);

  const isDragging=dragFrom===idx;
  const isDragOver=dragOver===idx&&dragFrom!==null&&dragFrom!==idx;

  /* CSS transform string for the image */
  const imgTransform=`translate(${tf.tx||0}px,${tf.ty||0}px) scale(${tf.scale||1})`;

  return(
    <div
      ref={cellRef}
      className={`cell${isDragging?' dragging':''}${isDragOver&&!isEditMode?' drag-over':''}${isEditMode?' edit-mode':''}`}
      /* draggable only when NOT in edit mode */
      draggable={!isEditMode}
      onDragStart={handleDragStart}
      onDragEnter={handleDragEnter}
      onDragOver={handleDragOver}
      onDrop={handleDrop}
      onDragEnd={handleDragEnd}
      /* click detection */
      onPointerDown={handlePointerDown}
      onPointerUp={handlePointerUp}
      onWheel={onWheel}
      style={{touchAction:isEditMode?'none':'auto'}}
    >
      {/* IMAGE / VIDEO LAYER */}
      <div
        className="cell-img"
        onMouseDown={onImgMouseDown}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{
          /* pointer-events only active in edit mode (set via CSS .edit-mode .cell-img) */
        }}
      >
        {img.isVideo
          ?<video src={img.url} poster={img.thumbUrl||undefined} muted playsInline preload="metadata"
              style={{transform:imgTransform,transformOrigin:'center center'}}/>
          :<img src={img.url} alt="" draggable={false}
              style={{transform:imgTransform,transformOrigin:'center center'}}/>
        }
      </div>

      {/* ZOOM CONTROLS — only in edit mode */}
      {isEditMode&&(
        <div className="zoom-ctl" onPointerDown={e=>e.stopPropagation()}>
          <button onClick={e=>{e.stopPropagation();zoomBy(-0.25)}} title="Zoom out">−</button>
          <span>{Math.round((tf.scale||1)*100)}%</span>
          <button onClick={e=>{e.stopPropagation();zoomBy(0.25)}} title="Zoom in">+</button>
        </div>
      )}

      {/* TAGS */}
      {img.isNew&&<div className="tag-n">NEW</div>}
      {img.isVideo&&<div className="vid-badge">{Ico.video} VID</div>}
      {showPos&&!isEditMode&&(
        <div style={{position:'absolute',bottom:4,right:4,background:'rgba(0,0,0,.7)',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 5px',borderRadius:4,zIndex:12,pointerEvents:'none'}}>{idx+1}</div>
      )}

      {/* HOVER BAR — drag handle + action buttons */}
      <div className="cell-bar">
        {/* Drag handle (normal mode only) */}
        {!isEditMode&&(
          <div className="drag-handle">
            {Ico.drag}
          </div>
        )}

        <div style={{marginLeft:'auto',display:'flex',gap:4}} onPointerDown={e=>e.stopPropagation()}>
          {isEditMode?(
            <>
              <button className="cell-btn" onClick={e=>{e.stopPropagation();reset()}}>Reset</button>
              <button className="cell-btn blue" onClick={e=>{e.stopPropagation();onDeactivateEdit()}}>Done ✓</button>
            </>
          ):(
            <>
              <button className="cell-btn" onClick={e=>{e.stopPropagation();onOpenViewer(idx)}}>View</button>
              <button className="cell-btn red" onClick={e=>{e.stopPropagation();onRemove(img.id)}}>✕</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

          <div className="feed-time">{timeAgo}</div>
        </div>
      </div>
      <div className="feed-cmt-bar">
        <div style={{width:28,height:28,borderRadius:'50%',background:'var(--bg3)',flexShrink:0,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)'}}>
          {profile.avatar?<img src={profile.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:Ico.person}
        </div>
        <span style={{flex:1,fontSize:13,color:'var(--t3)'}}>Add a comment…</span>
        <span style={{fontSize:18}}>😊</span>
      </div>
    </div>
  );
}

/* ═══════════════════
   UPLOAD PANEL
   ═══════════════════ */
function UploadPanel({images,setImages,gridImages,setGridImages,addPos,setAddPos}){
  const fref=useRef();
  const[over,setOver]=useState(false);
  const[loading,setLoading]=useState(false);

  const load=useCallback(async files=>{
    const valid=Array.from(files).filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/'));
    if(!valid.length)return;
    setLoading(true);
    for(const file of valid){
      const isVid=file.type.startsWith('video/');
      const id=uid();
      const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)}).catch(()=>null);
      if(!dataUrl)continue;
      let thumbUrl=null;
      if(isVid)thumbUrl=await genVideoThumb(file);
      setImages(prev=>[...prev,{id,url:dataUrl,thumbUrl,name:file.name,isNew:true,isVideo:isVid,size:file.size}]);
    }
    setLoading(false);
  },[setImages]);

  const addToGrid=img=>{if(gridImages.find(g=>g.id===img.id))return;setGridImages(p=>addPos==='start'?[img,...p]:[...p,img])};
  const addAll=()=>{const n=images.filter(i=>!gridImages.find(g=>g.id===i.id));if(!n.length)return;setGridImages(p=>addPos==='start'?[...n,...p]:[...p,...n])};
  const remove=id=>{setImages(p=>p.filter(i=>i.id!==id));setGridImages(p=>p.filter(i=>i.id!==id))};

  return(
    <div style={{padding:'12px 16px'}}>
      <div className={`upload-zone${over?' over':''}`}
        onDragOver={e=>{e.preventDefault();setOver(true)}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);load(e.dataTransfer.files)}}
        onClick={()=>fref.current.click()}>
        <div style={{color:'var(--t3)',marginBottom:8,display:'flex',justifyContent:'center'}}>{loading?<span className="spin"/>:Ico.upload}</div>
        <div style={{fontSize:14,fontWeight:600,marginBottom:3}}>{loading?'Processing…':'Drop images or videos'}</div>
        <div style={{fontSize:12,color:'var(--t3)'}}>JPG · PNG · MP4 · MOV · WebM</div>
        <input ref={fref} type="file" accept="image/*,video/mp4,video/webm,video/quicktime" multiple style={{display:'none'}} onChange={e=>load(e.target.files)}/>
      </div>

      {images.length>0&&(
        <div style={{marginTop:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span className="lbl">Gallery ({images.length})</span>
            <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
              <select value={addPos} onChange={e=>setAddPos(e.target.value)} style={{width:'auto',fontSize:11,padding:'4px 8px'}}>
                <option value="start">→ Front</option>
                <option value="end">→ End</option>
              </select>
              <button className="btn btn-p" style={{padding:'4px 10px',fontSize:12}} onClick={addAll}>+All</button>
            </div>
          </div>
          <div className="gallery-grid">
            {images.map(img=>{
              const inGrid=!!gridImages.find(g=>g.id===img.id);
              return(
                <div key={img.id} className={`gimg${inGrid?' in':''}`} onClick={()=>addToGrid(img)}>
                  <img src={img.isVideo?(img.thumbUrl||img.url):img.url} alt=""/>
                  {img.isVideo&&<div style={{position:'absolute',bottom:2,left:2,background:'rgba(0,0,0,.7)',color:'#fff',fontSize:8,padding:'1px 4px',borderRadius:3}}>{Ico.video}</div>}
                  {inGrid&&<div style={{position:'absolute',inset:0,background:'rgba(0,149,246,.25)',display:'flex',alignItems:'center',justifyContent:'center'}}>{Ico.check}</div>}
                  <button className="del" onClick={e=>{e.stopPropagation();remove(img.id)}}>✕</button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════
   PROJECTS PANEL
   ═══════════════════ */
function ProjectsPanel({projects,saveProject,loadProject,deleteProject}){
  const[nm,setNm]=useState('');
  const[show,setShow]=useState(false);
  const go=()=>{if(nm.trim()){saveProject(nm.trim());setNm('');setShow(false)}};
  return(
    <div style={{padding:'12px 16px'}}>
      <button className="btn btn-p" style={{width:'100%',justifyContent:'center',marginBottom:14}} onClick={()=>setShow(true)}>
        {Ico.save} Save Current Layout
      </button>
      {!projects.length&&<div style={{textAlign:'center',padding:'28px 12px',color:'var(--t3)',fontSize:13,lineHeight:1.7}}>No saved projects.<br/>Save your layout above.</div>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {projects.map(p=>(
          <div key={p.id} className="proj-item" onClick={()=>loadProject(p)}>
            <div className="proj-thumb">
              {(p.gridImages||[]).slice(0,9).map((img,i)=><div key={i}><img src={img.url} alt=""/></div>)}
              {Array.from({length:Math.max(0,9-(p.gridImages||[]).length)}).map((_,i)=><div key={`e${i}`}/>)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
              <div style={{fontSize:11,color:'var(--t3)'}}>{(p.gridImages||[]).length} posts · {new Date(p.date).toLocaleDateString()}</div>
            </div>
            <button className="btn-ico" style={{padding:6,flexShrink:0}} onClick={e=>{e.stopPropagation();deleteProject(p.id)}}>{Ico.trash}</button>
          </div>
        ))}
      </div>
      {show&&(
        <div className="overlay" onClick={()=>setShow(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:16,marginBottom:12}}>Save Project</h3>
            <input placeholder="Project name…" value={nm} onChange={e=>setNm(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&go()}/>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <button className="btn btn-p" style={{flex:1}} onClick={go}>Save</button>
              <button className="btn btn-s" onClick={()=>setShow(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════
   GRID VIEW — orchestrates cells
   ═══════════════════════════════ */
const MAX_UNDO=25;
function GridView({gridImages,setGridImages,gridRows,profile,setProfile,showPos,dark,onExport,undo,redo,canUndo,canRedo}){
  const[editId,setEditId]=useState(null);
  const[transforms,setTransforms]=useState({}); // id → {scale,tx,ty}
  const[dragFrom,setDragFrom]=useState(null);
  const[dragOver,setDragOver]=useState(null);
  const[viewer,setViewer]=useState(null);
  const[exporting,setExporting]=useState(false);
  const gridRef=useRef();

  /* Close edit mode when clicking outside grid */
  useEffect(()=>{
    if(!editId)return;
    const h=e=>{if(gridRef.current&&!gridRef.current.contains(e.target))setEditId(null)};
    document.addEventListener('pointerdown',h,true);
    return()=>document.removeEventListener('pointerdown',h,true);
  },[editId]);

  const setTf=useCallback((id,tf)=>setTransforms(p=>({...p,[id]:tf})),[]);
  const getTf=id=>transforms[id]||DEFAULT_TF;

  /* Reorder on drop */
  const handleDrop=useCallback(toIdx=>{
    if(dragFrom===null||dragFrom===toIdx){setDragFrom(null);setDragOver(null);return}
    setGridImages(prev=>{
      const arr=[...prev];
      const[moved]=arr.splice(dragFrom,1);
      arr.splice(toIdx,0,moved);
      return arr;
    });
    setDragFrom(null);setDragOver(null);
  },[dragFrom,setGridImages]);

  const total=gridRows*3;
  const cells=[...gridImages];
  while(cells.length<total)cells.push(null);

  const doExport=async()=>{setExporting(true);await onExport();setExporting(false)};

  const isEditing=editId!==null;

  return(
    <div>
      <ProfileHeader profile={profile} setProfile={setProfile} postCount={gridImages.length}/>

      {/* Toolbar */}
      <div style={{padding:'7px 12px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:8,background:'var(--bg1)'}}>
        <button className="btn-ico" style={{opacity:canUndo?1:.3}} disabled={!canUndo} onClick={undo} title="Undo">{Ico.undo}</button>
        <button className="btn-ico" style={{opacity:canRedo?1:.3}} disabled={!canRedo} onClick={redo} title="Redo">{Ico.redo}</button>
        <span style={{fontSize:11,color:'var(--t3)',marginLeft:2,flex:1}}>
          {isEditing
            ?'Scroll/pinch to zoom · Drag to pan · Done to finish'
            :'Tap cell to zoom/crop · Drag to reorder'}
        </span>
        <button className="btn btn-p" style={{padding:'7px 12px',fontSize:12}} onClick={doExport} disabled={exporting}>
          {exporting?<span className="spin"/>:Ico.dl} Export
        </button>
      </div>

      {/* Grid */}
      <div id="ig-grid-wrap" ref={gridRef}>
        <div className="ig-grid">
          {cells.map((img,i)=>img
            ?(
              <GridCell
                key={img.id}
                img={img}
                idx={i}
                isEditMode={editId===img.id}
                onActivateEdit={id=>{setEditId(id)}}
                onDeactivateEdit={()=>setEditId(null)}
                onRemove={id=>setGridImages(p=>p.filter(x=>x.id!==id))}
                tf={getTf(img.id)}
                onTfChange={tf=>setTf(img.id,tf)}
                dragFrom={dragFrom}
                dragOver={dragOver}
                onDragStart={setDragFrom}
                onDragEnter={setDragOver}
                onDrop={handleDrop}
                onDragEnd={()=>{setDragFrom(null);setDragOver(null)}}
                showPos={showPos}
                onOpenViewer={setViewer}
              />
            )
            :(
              <div key={`e${i}`} className="empty-cell">{Ico.img}</div>
            )
          )}
        </div>
      </div>

      {viewer!==null&&(
        <PostViewer posts={gridImages} startIdx={Math.min(viewer,gridImages.length-1)} profile={profile} onClose={()=>setViewer(null)}/>
      )}
    </div>
  );
}

/* ═══════════════════
   SIDEBAR
   ═══════════════════ */
function Sidebar({tab,setTab,images,setImages,gridImages,setGridImages,addPos,setAddPos,projects,saveProject,loadProject,deleteProject,dark,setDark}){
  return(
    <div style={{background:'var(--bg1)',height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <span className="gtext" style={{fontWeight:800,fontSize:18,letterSpacing:-.5}}>GridPlan</span>
        <span style={{fontSize:11,color:'var(--t3)',background:'var(--bg2)',padding:'2px 8px',borderRadius:20,border:'1px solid var(--bd)'}}>beta</span>
        <button className="btn-ico" style={{marginLeft:'auto'}} onClick={()=>setDark(d=>!d)} title="Toggle theme">{dark?Ico.sun:Ico.moon}</button>
      </div>
      <div style={{padding:'10px 16px',borderBottom:'1px solid var(--bd)',flexShrink:0}}>
        <div className="tab-bar">
          <button className={`tab-btn${tab==='upload'?' on':''}`} onClick={()=>setTab('upload')}>Upload</button>
          <button className={`tab-btn${tab==='projects'?' on':''}`} onClick={()=>setTab('projects')}>Projects</button>
        </div>
      </div>
      <div style={{overflowY:'auto',flex:1}}>
        {tab==='upload'
          ?<UploadPanel images={images} setImages={setImages} gridImages={gridImages} setGridImages={setGridImages} addPos={addPos} setAddPos={setAddPos}/>
          :<ProjectsPanel projects={projects} saveProject={saveProject} loadProject={loadProject} deleteProject={deleteProject}/>
        }
      </div>
    </div>
  );
}

/* ═══════════════════
   CONTROLS BAR
   ═══════════════════ */
function Controls({rows,setRows,showPos,setShowPos}){
  return(
    <div style={{padding:'9px 14px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:8,overflowX:'auto',background:'var(--bg1)',flexShrink:0}}>
      <span className="lbl" style={{margin:0,whiteSpace:'nowrap',fontSize:10}}>Rows</span>
      <div style={{display:'flex',gap:4}}>
        {[[3,'3'],[6,'6'],[9,'9'],[12,'All']].map(([r,l])=>(
          <button key={r} className={`chip${rows===r?' on':''}`} onClick={()=>setRows(r)}>{l}</button>
        ))}
      </div>
      <button className={`chip${showPos?' on':''}`} style={{marginLeft:'auto'}} onClick={()=>setShowPos(s=>!s)}>
        {Ico.eye} #
      </button>
    </div>
  );
}

/* ═══════════════════════
   MOBILE DRAWER SIDEBAR
   ═══════════════════════ */
function MobileDrawer({open,onClose,drawerTab,setDrawerTab,sideProps,projects,saveProject,loadProject,deleteProject,dark,setDark}){
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(e.key==='Escape')onClose()};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[open,onClose]);
  useEffect(()=>{document.body.style.overflow=open?'hidden':'';return()=>{document.body.style.overflow=''}},[open]);
  return(
    <>
      <div className={`drawer-backdrop${open?' open':''}`} onClick={onClose}/>
      <div className={`drawer${open?' open':''}`}>
        <div className="drawer-head">
          <span className="gtext" style={{fontWeight:800,fontSize:18,letterSpacing:-.5}}>GridPlan</span>
          <button className="btn-ico" style={{marginLeft:'auto',padding:5}} onClick={onClose}>{Ico.close}</button>
        </div>
        <div className="drawer-nav">
          <button className={`drawer-item${drawerTab==='upload'?' on':''}`} onClick={()=>setDrawerTab('upload')}>{Ico.upload} Upload Images</button>
          <button className={`drawer-item${drawerTab==='projects'?' on':''}`} onClick={()=>setDrawerTab('projects')}>{Ico.save} Saved Projects</button>
        </div>
        <div className="drawer-content">
          {drawerTab==='upload'
            ?<UploadPanel {...sideProps}/>
            :<ProjectsPanel projects={projects} saveProject={saveProject} loadProject={loadProject} deleteProject={deleteProject}/>
          }
        </div>
        <div className="drawer-footer">
          <button className="btn-ico" onClick={()=>setDark(d=>!d)} style={{padding:6}}>{dark?Ico.sun:Ico.moon}</button>
          <span style={{fontSize:12,color:'var(--t3)'}}>{dark?'Light mode':'Dark mode'}</span>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════
   APP ROOT
   ═══════════════════ */
function App(){
  const[dark,setDarkRaw]=useLs('igp-dark',true);
  const[images,setImages]=useState([]);
  const[gridImgs,setGridImgsRaw]=useState([]);
  const[rows,setRows]=useState(3);
  const[showPos,setShowPos]=useState(false);
  const[sideTab,setSideTab]=useState('upload');
  const[addPos,setAddPos]=useState('start');
  const[projects,setProjects]=useLs('igp-projects',[]);
  const[profile,setProfile]=useLs('igp-profile',{username:'yourusername',displayName:'Your Name',bio:'📸 Photographer & Creator\n✨ Sharing moments',followers:'1.2K',following:'842',avatar:''});
  const[toast,setToast]=useState('');
  const undoQ=useRef([]);
  const redoQ=useRef([]);
  const[,forceRender]=useState(0);
  const[drawerOpen,setDrawerOpen]=useState(false);
  const[drawerTab,setDrawerTab]=useState('upload');

  const setDark=useCallback(v=>setDarkRaw(v),[setDarkRaw]);
  useEffect(()=>{document.body.className=dark?'':'lm'},[dark]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2600)};

  const setGridImages=useCallback(updater=>{
    setGridImgsRaw(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      undoQ.current=[...undoQ.current.slice(-MAX_UNDO),prev];
      redoQ.current=[];
      forceRender(n=>n+1);
      return next;
    });
  },[]);

  const undo=()=>{if(!undoQ.current.length)return;const p=undoQ.current.pop();redoQ.current.push(gridImgs);setGridImgsRaw(p);forceRender(n=>n+1)};
  const redo=()=>{if(!redoQ.current.length)return;const n=redoQ.current.pop();undoQ.current.push(gridImgs);setGridImgsRaw(n);forceRender(n=>n+1)};

  const saveProject=name=>{setProjects(p=>[{id:uid(),name,date:Date.now(),gridImages:gridImgs,images},...p]);showToast(`"${name}" saved ✓`)};
  const loadProject=p=>{setImages(p.images||[]);setGridImgsRaw(p.gridImages||[]);showToast(`Loaded "${p.name}"`)};
  const deleteProject=id=>{setProjects(p=>p.filter(x=>x.id!==id));showToast('Deleted')};

  const doExport=async()=>{
    const el=document.getElementById('ig-grid-wrap');
    if(!el){showToast('Nothing to export yet');return}
    showToast('Exporting…');
    try{
      const canvas=await html2canvas(el,{useCORS:true,scale:2,backgroundColor:dark?'#000':'#fafafa',logging:false});
      const a=document.createElement('a');a.download='instagram-grid.png';a.href=canvas.toDataURL('image/png');a.click();
      showToast('Downloaded 🎉');
    }catch{showToast('Export failed — try again')}
  };

  const[desk,setDesk]=useState(()=>window.innerWidth>=768);
  useEffect(()=>{const h=()=>setDesk(window.innerWidth>=768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);

  const sideProps={images,setImages,gridImages:gridImgs,setGridImages,addPos,setAddPos};
  const gridProps={gridImages:gridImgs,setGridImages,gridRows:rows,profile,setProfile,showPos,dark,onExport:doExport,undo,redo,canUndo:undoQ.current.length>0,canRedo:redoQ.current.length>0};

  const emptyState=(
    <div style={{padding:'44px 20px',textAlign:'center',color:'var(--t3)'}}>
      <div style={{fontSize:40,marginBottom:14}}>📸</div>
      <div style={{fontSize:17,fontWeight:700,marginBottom:8,color:'var(--t2)'}}>Your grid is empty</div>
      <div style={{fontSize:13,maxWidth:280,margin:'0 auto 18px',lineHeight:1.7}}>Upload photos then tap each one to add to your grid</div>
      {!desk&&<button className="btn btn-p" onClick={()=>{setDrawerTab('upload');setDrawerOpen(true)}}>{Ico.upload} Upload Photos</button>}
    </div>
  );

  if(!desk){
    return(
      <div>
        <div className="mob-header">
          <button className="hamburger-btn" onClick={()=>setDrawerOpen(true)}>
            <svg width="22"height="22"viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"><line x1="3"y1="6"x2="21"y2="6"/><line x1="3"y1="12"x2="21"y2="12"/><line x1="3"y1="18"x2="21"y2="18"/></svg>
          </button>
          <span className="gtext" style={{fontWeight:800,fontSize:17,letterSpacing:-.5}}>GridPlan</span>
          <button className="btn-ico" style={{marginLeft:'auto',padding:5}} onClick={()=>setDark(d=>!d)}>{dark?Ico.sun:Ico.moon}</button>
        </div>
        <MobileDrawer open={drawerOpen} onClose={()=>setDrawerOpen(false)} drawerTab={drawerTab} setDrawerTab={setDrawerTab} sideProps={sideProps} projects={projects} saveProject={saveProject} loadProject={loadProject} deleteProject={deleteProject} dark={dark} setDark={setDark}/>
        <Controls rows={rows} setRows={setRows} showPos={showPos} setShowPos={setShowPos}/>
        <GridView {...gridProps}/>
        {!gridImgs.length&&emptyState}
        {toast&&<div className="toast">{toast}</div>}
      </div>
    );
  }

  return(
    <div className="app-layout">
      <div className="sidebar">
        <Sidebar tab={sideTab} setTab={setSideTab} {...sideProps} projects={projects} saveProject={saveProject} loadProject={loadProject} deleteProject={deleteProject} dark={dark} setDark={setDark}/>
      </div>
      <div className="main-area">
        <Controls rows={rows} setRows={setRows} showPos={showPos} setShowPos={setShowPos}/>
        <GridView {...gridProps}/>
        {!gridImgs.length&&emptyState}
      </div>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
